<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OnePage Expert | Acesso ao Sistema</title>

    <link rel="icon" type="image/x-icon" href="/assets/fave.png" />

    <link rel="stylesheet" href="/css/login.css" />
  </head>
  <body>
    <div class="login-container">
      <div class="login-box">
        <!-- ==========================
             🔷 MARCA / TOPO
        =========================== -->
        <div class="login-brand">
          <div class="login-brand-logo">
            <img src="/assets/fave.png" alt="Logo da Marca" />
          </div>

          <div class="login-brand-texto">
            <h1>OnePage Expert</h1>
            <p>Central de Indicadores Operacionais</p>
          </div>
        </div>

        <!-- ==========================
             🔐 TÍTULO
        =========================== -->
        <div class="login-header">
          <h2>🔐 Acesso ao Sistema</h2>
          <span>Entre com sua matrícula e senha para continuar</span>
        </div>

        <!-- ==========================
             🧾 FORMULÁRIO
        =========================== -->
        <form
          class="login-form"
          onsubmit="
            event.preventDefault();
            fazerLogin();
          "
        >
          <!-- MATRÍCULA OU E-MAIL -->
          <div class="campo-login">
            <label for="email">Matrícula ou e-mail</label>

            <div class="input-wrapper">
              <span class="input-icon">👤</span>

              <input
                type="text"
                id="email"
                placeholder="Digite sua matrícula"
                autocomplete="username"
              />
            </div>
          </div>

          <!-- SENHA -->
          <div class="campo-login">
            <label for="senha">Senha</label>

            <div class="input-wrapper input-wrapper-senha">
              <span class="input-icon">🔒</span>

              <input
                type="password"
                id="senha"
                placeholder="Digite sua senha"
                autocomplete="current-password"
              />

              <button
                type="button"
                class="btn-toggle-senha"
                onclick="toggleSenhaLogin()"
                aria-label="Mostrar ou ocultar senha"
                title="Mostrar / ocultar senha"
              >
                <span id="iconToggleSenha">👁️</span>
              </button>
            </div>
          </div>

          <!-- BOTÃO -->
          <button id="btnLogin" class="btn-login" type="submit">
            <span class="btn-login-texto">Entrar</span>
          </button>

          <!-- MENSAGEM DE ERRO -->
          <p id="erro" class="login-erro" aria-live="polite"></p>
        </form>

        <!-- ==========================
             🔒 RODAPÉ
        =========================== -->
        <div class="login-footer">
          <span>Ambiente seguro para acesso operacional e gerencial</span>
        </div>
      </div>
    </div>

    <!-- Overlay de carregamento -->
    <div class="login-overlay" id="loginOverlay">
      <div class="overlay-content">
        <lottie-player
          id="overlayRing"
          src="/assets/loading.json"
          background="transparent"
          speed="1"
          style="width:120px;height:120px;"
          loop
          autoplay
        ></lottie-player>
        <svg class="overlay-checkmark" id="overlayCheck" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
          <circle class="checkmark-circle" cx="26" cy="26" r="24" fill="none" stroke="#6ee79a" stroke-width="2.5"/>
          <path   class="checkmark-tick"   fill="none" stroke="#6ee79a" stroke-width="3"
                  stroke-linecap="round" stroke-linejoin="round" d="M14 27 l8 8 l16 -16"/>
        </svg>
        <p class="overlay-texto" id="overlayTexto">Verificando acesso...</p>
      </div>
    </div>

    <!-- Toggle da senha -->
    <script>
      function toggleSenhaLogin() {
        const input = document.getElementById("senha");
        const icon = document.getElementById("iconToggleSenha");

        if (!input || !icon) return;

        const visivel = input.type === "text";

        input.type = visivel ? "password" : "text";
        icon.textContent = visivel ? "👁️" : "🙈";
      }
    </script>

    <!-- 🪵 LOGGER CENTRAL (primeiro, síncrono) -->
    <script src="app/logger.js"></script>

    <!-- Lottie Player -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <!-- Supabase -->
    <script
      src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"
      defer
    ></script>
    <script src="app/login.js" defer></script>
  </body>
</html>
