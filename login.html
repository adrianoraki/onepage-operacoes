<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OnePage Expert | Acesso ao Sistema</title>

    <link rel="stylesheet" href="/css/login.css" />
  </head>
  <body>
    <div class="login-container">
      <div class="login-box">
        <h2>🔐 Acesso ao Sistema</h2>

        <form onsubmit="event.preventDefault(); fazerLogin();">
          <input
            type="email"
            id="email"
            placeholder="Digite seu e-mail"
            autocomplete="username"
          />

          <input
            type="password"
            id="senha"
            placeholder="Digite sua senha"
            autocomplete="current-password"
          />

          <button id="btnLogin" type="submit">Entrar</button>

          <p id="erro" aria-live="polite"></p>
        </form>
      </div>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js" defer></script>
    <script src="app/login.js" defer></script>
  </body>
</html>
