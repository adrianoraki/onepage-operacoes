<div class="main_box">
  <input type="checkbox" id="check" />

  <div class="sidebar_menu">
    <!-- ==========================
         🔷 LOGO
    =========================== -->
    <div class="logo">
      <a
        href="#"
        onclick="
          logMenu('dashboard-logo');
          mostrar('dashboard');
          return false;
        "
      >
        <i class="fas fa-layer-group" style="color: #3f7bcc"></i>
        <span>OnePage Expert</span>
      </a>
    </div>

    <!-- ==========================
         📋 MENU PRINCIPAL
    =========================== -->
    <div class="menu">
      <ul id="menu-list">
        <!-- DASHBOARD -->
        <li
          class="menu-item"
          data-menu="dashboard"
          onclick="
            logMenu('dashboard');
            mostrar('dashboard');
          "
        >
          <i class="fas fa-tachometer-alt menu-icon icon-dashboard"></i>
          <span>Dashboard</span>
        </li>

        <!-- RANKING -->
        <li
          class="menu-item"
          data-menu="ranking"
          onclick="
            logMenu('ranking');
            mostrar('ranking');
          "
        >
          <i class="fas fa-trophy" style="color: #ffc107"></i>
          <span>Ranking</span>
        </li>

        <!-- INDICADORES -->
        <li
          class="menu-item"
          data-menu="indicadores"
          onclick="
            logMenu('indicadores');
            mostrar('indicadores');
          "
        >
          <i class="fas fa-chart-line" style="color: #03a9f4"></i>
          <span>Indicadores</span>
        </li>

        <!-- COMPARATIVOS -->
        <li
          class="menu-item"
          data-menu="comparativos"
          onclick="
            logMenu('comparativos');
            mostrar('comparativos');
          "
        >
          <i class="fas fa-chart-pie" style="color: #9c27b0"></i>
          <span>Comparativos</span>
        </li>

        <!-- 🔥 CLASSES DINÂMICAS ENTRAM AQUI -->
      </ul>
    </div>

    <!-- ==========================
         🔻 RODAPÉ
    =========================== -->
    <div class="bottom-area">
      <!-- CONFIGURAÇÕES -->
      <div
        class="config-btn"
        onclick="
          logMenu('configuracoes');
          abrirConfiguracoesMenu();
        "
      >
        <div class="config-btn-content">
          <i class="fas fa-gear" style="color: #9e9e9e"></i>
          <span>Configurações</span>
        </div>
      </div>

      <!-- ==========================
           👤 USUÁRIO
      =========================== -->
      <div class="user-footer">
        <div class="user-info">
          <div class="avatar" id="avatar"></div>

          <div class="dados">
            <span class="nome" id="nomeUsuario"></span>
            <span class="matricula" id="matriculaUsuario"></span>
            <span class="email" id="emailUsuario"></span>
          </div>
        </div>

        <!-- LOGOUT -->
        <button
          type="button"
          class="btn-logout"
          onclick="
            logMenu('logout');
            logout();
          "
        >
          <i class="fas fa-right-from-bracket"></i>
          <span>Sair</span>
        </button>
      </div>
    </div>
  </div>
</div>
