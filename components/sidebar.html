<div class="main_box">
  <input type="checkbox" id="check" />

  <div class="sidebar_menu">
    <!-- ==========================
         🔷 LOGO
    =========================== -->
    <div class="logo">
      <a href="#">
        <i class="fas fa-layer-group" style="color: #3f7bcc"></i>
        OnePage Expert
      </a>
    </div>

    <!-- ==========================
         📋 MENU
    =========================== -->
    <div class="menu">
      <ul id="menu-list">
        <li
          onclick="
            logMenu('dashboard');
            mostrar('dashboard');
          "
        >
          <i class="fas fa-gauge-high" style="color: #4caf50"></i>
          <span>Dashboard</span>
        </li>

        <li
          onclick="
            logMenu('ranking');
            mostrar('ranking');
          "
        >
          <i class="fas fa-trophy" style="color: #ffc107"></i>
          <span>Ranking</span>
        </li>

        <li
          onclick="
            logMenu('indicadores');
            mostrar('indicadores');
          "
        >
          <i class="fas fa-chart-line" style="color: #03a9f4"></i>
          <span>Indicadores</span>
        </li>

        <li
          onclick="
            logMenu('comparativos');
            mostrar('comparativos');
          "
        >
          <i class="fas fa-chart-pie" style="color: #9c27b0"></i>
          <span>Comparativos</span>
        </li>

        <!-- 🔥 CLASSES DINÂMICAS ENTRAM AQUI -->
      </ul>
    </div>

    <!-- ==========================
         🔻 RODAPÉ
    =========================== -->
    <div class="bottom-area">
      <!-- CONFIG -->

      <div class="config-btn" onclick="abrirConfiguracoesMenu()">
        <i class="fas fa-gear" style="color: #9e9e9e"></i>
        <span>Configurações</span>
      </div>

      <!-- ==========================
           👤 USUÁRIO
      =========================== -->
      <div class="user-footer">
        <div class="user-info">
          <div class="avatar" id="avatar"></div>

          <div class="dados">
            <span class="nome" id="nomeUsuario"></span>
            <span class="matricula" id="matriculaUsuario"></span>
            <span class="email" id="emailUsuario"></span>
          </div>
        </div>

        <!-- LOGOUT -->

        <button
          class="btn-logout"
          onclick="
            logMenu('logout');
            logout();
          "
        >
          <i class="fas fa-right-from-bracket"></i>
          Sair
        </button>
      </div>
    </div>
  </div>
</div>
