<div class="main_box">

  <input type="checkbox" id="check" />

  <div class="btn_one">
    <label for="check">
      <i class="fas fa-bars"></i>
    </label>
  </div>

  <div class="sidebar_menu">

    <!-- LOGO -->
    <div class="logo">
      <a href="#">OnePage Expert</a>
    </div>


    <!-- MENU PRINCIPAL -->
    <div class="menu">
      <ul>

        <li onclick="mostrar('dashboard')">
          <i class="fas fa-qrcode"></i>
          <span>Dashboard</span>
        </li>

        <li onclick="mostrar('ranking')">
          <i class="fas fa-chart-bar"></i>
          <span>Ranking</span>
        </li>

        <li onclick="togglePreenchimento()">
          <i class="fas fa-edit"></i>
          <span>Preenchimento</span>
        </li>

        <!-- SUBMENU -->
        <li id="submenu-preenchimento" class="submenu">
          <ul>
            <li onclick="selecionarIndicador('Ruptura Final')">Ruptura Final</li>
            <li onclick="selecionarIndicador('Etiqueta')">Etiqueta</li>
            <li onclick="selecionarIndicador('Self-Checkout')">Self-Checkout</li>
            <li onclick="selecionarIndicador('Desconto')">Desconto</li>
            <li onclick="selecionarIndicador('Cancelamento')">Cancelamento</li>
            <li onclick="selecionarIndicador('Devolução')">Devolução</li>
            <li onclick="selecionarIndicador('PSV')">PSV</li>
            <li onclick="selecionarIndicador('Quebra Identificada')">Quebra</li>
            <li onclick="selecionarIndicador('Quebra Identificada FLV')">Quebra FLV</li>
          </ul>
        </li>

        <li onclick="mostrar('indicadores')">
          <i class="fas fa-chart-line"></i>
          <span>Indicadores</span>
        </li>

        <li onclick="mostrar('comparativos')">
          <i class="fas fa-chart-pie"></i>
          <span>Comparativos</span>
        </li>

      </ul>
    </div>

    <!-- ✅ USUÁRIO + CONFIGURAÇÕES (FINAL FIXO) -->
    <div class="bottom-area">

      <!-- CONFIGURAÇÕES -->
      <div class="config-btn" onclick="mostrar('configuracoes')">
        <i class="fas fa-cog"></i>
        <span>Configurações</span>
      </div>

      <!-- USUÁRIO -->
      <div class="user-footer">

        <div class="user-info">
          <div class="avatar">U</div>

          <div class="dados">
            <span class="nome">Nome Usuário</span>
            <small class="matricula">Mat: </small>
            <small class="email">email@empresa.com</small>
          </div>
        </div>

        <button class="btn-logout">Sair</button>

      </div>

    </div>

  </div>
</div>
