<style>
  /* ==========================
     🎨 SIDEBAR - BASE
  ========================== */
  .main_box {
    width: 100%;
    height: 100%;
  }

  .sidebar_menu {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 14px 12px;
    box-sizing: border-box;
    background: linear-gradient(180deg, #0f1722 0%, #101b2b 38%, #0d1623 100%);
    color: #ffffff;
    border-right: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow: 8px 0 28px rgba(0, 0, 0, 0.18);
    overflow: hidden;
  }

  #check {
    display: none;
  }

  /* ==========================
     🔷 LOGO
  ========================== */
  .sidebar_menu .logo {
    margin-bottom: 14px;
    padding: 2px 4px 10px 4px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.07);
  }

  .sidebar_menu .logo a {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: #ffffff;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.2px;
  }

  .sidebar_menu .logo a i {
    font-size: 18px;
  }

  .sidebar_menu .logo a span {
    display: inline-block;
    white-space: nowrap;
  }

  /* ==========================
     📋 MENU PRINCIPAL
  ========================== */
  .sidebar_menu .menu {
    flex: 1 1 auto;
    overflow-y: auto;
    padding-right: 2px;
    margin-top: 4px;
  }

  .sidebar_menu .menu::-webkit-scrollbar {
    width: 6px;
  }

  .sidebar_menu .menu::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.14);
    border-radius: 10px;
  }

  .sidebar_menu .menu ul {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .sidebar_menu .menu-item,
  .sidebar_menu .menu ul li {
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 44px;
    padding: 10px 12px;
    margin: 4px 0;
    border-radius: 12px;
    cursor: pointer;
    user-select: none;
    transition:
      background 0.2s ease,
      transform 0.16s ease,
      box-shadow 0.2s ease,
      color 0.2s ease;
    color: #e6edf5;
  }

  .sidebar_menu .menu-item:hover,
  .sidebar_menu .menu ul li:hover {
    background: rgba(255, 255, 255, 0.08);
    transform: translateX(2px);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
  }

  .sidebar_menu .menu-item i,
  .sidebar_menu .menu ul li i {
    width: 18px;
    min-width: 18px;
    text-align: center;
    font-size: 16px;
  }

  .sidebar_menu .menu-item span,
  .sidebar_menu .menu ul li span {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.2;
    color: inherit;
  }

  /* ==========================
     🎨 ÍCONES PRINCIPAIS
  ========================== */
  .icon-dashboard {
    color: #4caf50 !important;
  }

  .icon-analises {
    color: #ffc107 !important;
  }

  .icon-comparativos {
    color: #9c27b0 !important;
  }

  .icon-config {
    color: #9e9e9e !important;
  }

  /* ==========================
     👑 PAINEL DE OURO
  ========================== */
  .menu-item.menu-painel-ouro {
    position: relative;
    background: linear-gradient(
      90deg,
      rgba(212, 175, 55, 0.1),
      rgba(255, 215, 0, 0.06)
    );
    border: 1px solid rgba(212, 175, 55, 0.22);
  }

  .menu-item.menu-painel-ouro:hover {
    background: linear-gradient(
      90deg,
      rgba(212, 175, 55, 0.18),
      rgba(255, 215, 0, 0.1)
    );
    border-color: rgba(244, 197, 66, 0.34);
    box-shadow:
      0 8px 20px rgba(212, 175, 55, 0.1),
      inset 0 0 0 1px rgba(255, 215, 0, 0.06);
  }

  .icon-painel-ouro {
    color: #d4af37 !important;
    filter: drop-shadow(0 0 4px rgba(212, 175, 55, 0.24));
  }

  .menu-item.menu-painel-ouro span {
    color: #f4e7b2;
    font-weight: 700;
  }

  .menu-item.menu-painel-ouro::after {
    content: "Premium";
    margin-left: auto;
    font-size: 10px;
    font-weight: 700;
    color: #3e2f00;
    background: linear-gradient(180deg, #f4d35e 0%, #d4af37 100%);
    padding: 3px 8px;
    border-radius: 999px;
    box-shadow: 0 4px 10px rgba(212, 175, 55, 0.18);
  }

  /* ==========================
     🔥 CLASSES DINÂMICAS
  ========================== */
  .menu-classe {
    font-weight: 700;
  }

  .submenu {
    display: none;
    margin: 2px 0 8px 0;
    padding: 0;
    list-style: none;
    border-left: 1px solid rgba(255, 255, 255, 0.08);
    margin-left: 14px;
    padding-left: 6px;
  }

  .submenu .submenu-item,
  .submenu li {
    position: relative;
    display: flex;
    align-items: center;
    padding: 7px 10px 7px 30px;
    margin: 2px 0;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 500;
    color: #b9c8d8;
    transition: all 0.2s ease;
    cursor: pointer;
  }

  .submenu .submenu-item::before,
  .submenu li::before {
    content: "";
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #4caf50;
    opacity: 0.9;
  }

  .submenu .submenu-item:hover,
  .submenu li:hover {
    background: rgba(255, 255, 255, 0.06);
    color: #ffffff;
  }

  .submenu.ativo {
    display: block;
  }

  /* ==========================
     🔻 RODAPÉ
  ========================== */
  .bottom-area {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(255, 255, 255, 0.07);
  }

  /* ==========================
     ⚙️ CONFIGURAÇÕES
  ========================== */
  .config-btn {
    margin-bottom: 12px;
    border-radius: 12px;
    cursor: pointer;
    transition:
      background 0.2s ease,
      transform 0.16s ease;
  }

  .config-btn:hover {
    background: rgba(255, 255, 255, 0.07);
    transform: translateX(2px);
  }

  .config-btn-content {
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 42px;
    padding: 10px 12px;
  }

  .config-btn-content span {
    font-size: 14px;
    font-weight: 600;
    color: #dfe7ef;
  }

  /* ==========================
     👤 USUÁRIO
  ========================== */
  .user-footer {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .user-info {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px;
    border-radius: 14px;
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.06),
      rgba(255, 255, 255, 0.035)
    );
    border: 1px solid rgba(255, 255, 255, 0.07);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.03),
      0 8px 18px rgba(0, 0, 0, 0.18);
  }

  .avatar {
    width: 58px;
    height: 58px;
    min-width: 58px;
    border-radius: 16px;
    background: linear-gradient(180deg, #1e6091 0%, #0a3d62 100%);
    color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 800;
    box-shadow: 0 8px 18px rgba(10, 61, 98, 0.3);
  }

  .dados {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
  }

  .dado-linha {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    font-size: 12px;
    line-height: 1.35;
    min-width: 0;
  }

  .dado-label {
    min-width: 64px;
    color: #c7d2de;
    font-weight: 700;
    flex-shrink: 0;
  }

  .dado-valor {
    color: #ffffff;
    font-weight: 600;
    word-break: break-word;
    min-width: 0;
  }

  .dado-valor.email {
    color: #b8c5d3;
    font-weight: 500;
  }

  /* ==========================
     🚪 LOGOUT
  ========================== */
  .btn-logout {
    width: 100%;
    min-height: 44px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #b91c1c, #dc2626);
    color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition:
      transform 0.16s ease,
      box-shadow 0.2s ease,
      filter 0.2s ease;
    box-shadow: 0 10px 18px rgba(220, 38, 38, 0.18);
  }

  .btn-logout:hover {
    transform: translateY(-1px);
    filter: brightness(1.03);
    box-shadow: 0 14px 22px rgba(220, 38, 38, 0.22);
  }

  .btn-logout i {
    font-size: 14px;
  }

  /* ==========================
     📱 RESPONSIVIDADE
  ========================== */
  @media (max-width: 1366px) {
    .sidebar_menu {
      padding: 12px 10px;
    }

    .sidebar_menu .menu-item,
    .sidebar_menu .menu ul li {
      min-height: 42px;
      padding: 9px 11px;
    }

    .sidebar_menu .menu-item span,
    .sidebar_menu .menu ul li span {
      font-size: 13px;
    }

    .menu-item.menu-painel-ouro::after {
      font-size: 9px;
      padding: 3px 7px;
    }

    .user-info {
      padding: 12px;
      gap: 12px;
    }

    .avatar {
      width: 54px;
      height: 54px;
      min-width: 54px;
      font-size: 16px;
    }
  }

  @media (max-width: 1024px) {
    .sidebar_menu .logo a span {
      font-size: 16px;
    }

    .dado-label {
      min-width: 58px;
    }

    .dado-linha {
      font-size: 11px;
    }
  }

  @media (max-width: 768px) {
    .sidebar_menu {
      padding: 10px 8px;
    }

    .sidebar_menu .menu-item,
    .sidebar_menu .menu ul li {
      padding: 9px 10px;
      gap: 10px;
      border-radius: 10px;
    }

    .sidebar_menu .menu-item i,
    .sidebar_menu .menu ul li i {
      width: 16px;
      min-width: 16px;
      font-size: 14px;
    }

    .sidebar_menu .menu-item span,
    .sidebar_menu .menu ul li span {
      font-size: 12px;
    }

    .menu-item.menu-painel-ouro::after {
      display: none;
    }

    .user-info {
      padding: 11px;
      gap: 10px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      min-width: 48px;
      border-radius: 14px;
      font-size: 15px;
    }

    .dado-label {
      min-width: 54px;
    }

    .dado-linha {
      gap: 4px;
      font-size: 10.5px;
    }

    .btn-logout span {
      font-size: 12px;
    }
  }

  @media (min-width: 1600px) {
    .sidebar_menu {
      padding: 16px 14px;
    }

    .sidebar_menu .logo a {
      font-size: 19px;
    }

    .sidebar_menu .menu-item,
    .sidebar_menu .menu ul li {
      min-height: 46px;
    }

    .sidebar_menu .menu-item span,
    .sidebar_menu .menu ul li span {
      font-size: 14px;
    }

    .user-info {
      padding: 15px;
    }

    .avatar {
      width: 60px;
      height: 60px;
      min-width: 60px;
    }

    .dado-linha {
      font-size: 12.5px;
    }
  }

  @media (min-width: 2200px) {
    .sidebar_menu {
      padding: 18px 16px;
    }

    .sidebar_menu .logo a {
      font-size: 20px;
    }

    .sidebar_menu .menu-item span,
    .sidebar_menu .menu ul li span {
      font-size: 15px;
    }
  }
</style>

<div class="main_box">
  <input type="checkbox" id="check" />

  <div class="sidebar_menu">
    <!-- ==========================
         🔷 LOGO
    =========================== -->
    <div class="logo">
      <a
        href="#"
        onclick="
          logMenu('dashboard-logo');
          mostrar('dashboard');
          return false;
        "
      >
        <i class="fas fa-layer-group" style="color: #3f7bcc"></i>
        <span>OnePage Expert</span>
      </a>
    </div>

    <!-- ==========================
         📋 MENU PRINCIPAL
    =========================== -->
    <div class="menu">
      <ul id="menu-list">
        <!-- DASHBOARD -->
        <li
          class="menu-item"
          data-menu="dashboard"
          onclick="
            logMenu('dashboard');
            mostrar('dashboard');
          "
        >
          <i class="fas fa-tachometer-alt menu-icon icon-dashboard"></i>
          <span>Dashboard</span>
        </li>

        <!-- ANÁLISES -->
        <li
          class="menu-item"
          data-menu="analises"
          onclick="
            logMenu('analises');
            mostrar('analises');
          "
        >
          <i class="fas fa-trophy icon-analises"></i>
          <span>Análises</span>
        </li>

        <!-- PAINEL DE OURO -->
        <li
          class="menu-item menu-painel-ouro"
          data-menu="painel-ouro"
          onclick="
            logMenu('painel-ouro');
            mostrar('painel-ouro');
          "
        >
          <i class="fas fa-crown icon-painel-ouro"></i>
          <span>Painel de Ouro</span>
        </li>

        <!-- COMPARATIVOS -->
        <li
          class="menu-item"
          data-menu="comparativos"
          onclick="
            logMenu('comparativos');
            mostrar('comparativos');
          "
        >
          <i class="fas fa-chart-pie icon-comparativos"></i>
          <span>Comparativos</span>
        </li>

        <!-- 🔥 CLASSES DINÂMICAS ENTRAM AQUI -->
      </ul>
    </div>

    <!-- ==========================
         🔻 RODAPÉ
    =========================== -->
    <div class="bottom-area">
      <!-- CONFIGURAÇÕES -->
      <div
        class="config-btn"
        onclick="
          logMenu('configuracoes');
          abrirConfiguracoesMenu();
        "
      >
        <div class="config-btn-content">
          <i class="fas fa-gear icon-config"></i>
          <span>Configurações</span>
        </div>
      </div>

      <!-- ==========================
           👤 USUÁRIO
      =========================== -->
      <div class="user-footer">
        <div class="user-info">
          <div class="avatar" id="avatar"></div>

          <div class="dados">
            <div class="dado-linha">
              <span class="dado-label">Nome:</span>
              <span class="dado-valor" id="nomeUsuario"></span>
            </div>

            <div class="dado-linha">
              <span class="dado-label">Matrícula:</span>
              <span class="dado-valor" id="matriculaUsuario"></span>
            </div>

            <div class="dado-linha">
              <span class="dado-label">Função:</span>
              <span class="dado-valor" id="funcaoUsuario"></span>
            </div>

            <div class="dado-linha">
              <span class="dado-label">E-mail:</span>
              <span class="dado-valor email" id="emailUsuario"></span>
            </div>
          </div>
        </div>

        <button
          type="button"
          class="btn-logout"
          onclick="
            logMenu('logout');
            logout();
          "
        >
          <i class="fas fa-right-from-bracket"></i>
          <span>Sair</span>
        </button>
      </div>
    </div>
  </div>
</div>
