<style>
  /* ==========================
     🎨 SIDEBAR - BASE
  ========================== */
  .main_box {
    width: 100%;
    height: 100%;
  }

  .sidebar_menu {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 14px 12px;
    box-sizing: border-box;
    background: linear-gradient(180deg, #0f1722 0%, #101b2b 38%, #0d1623 100%);
    color: #ffffff;
    border-right: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow: 8px 0 28px rgba(0, 0, 0, 0.18);
    overflow: hidden;
  }

  #check {
    display: none;
  }

  /* ==========================
     🔷 LOGO
  ========================== */
  .sidebar_menu .logo {
    margin-bottom: 14px;
    padding: 2px 4px 10px 4px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.07);
  }

  .sidebar_menu .logo a {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: #ffffff;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.2px;
  }

  .sidebar_menu .logo a i {
    font-size: 17px;
  }

  .sidebar_menu .logo a span {
    display: inline-block;
    white-space: nowrap;
  }

  /* ==========================
     📋 MENU PRINCIPAL
  ========================== */
  .sidebar_menu .menu {
    flex: 1 1 auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y;
    padding-right: 2px;
    margin-top: 4px;
  }

  .sidebar_menu .menu::-webkit-scrollbar {
    width: 6px;
  }

  .sidebar_menu .menu::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.14);
    border-radius: 10px;
  }

  .sidebar_menu .menu ul {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .sidebar_menu .menu-item,
  .sidebar_menu .menu ul li {
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 38px;
    padding: 8px 11px;
    margin: 2px 0;
    border-radius: 11px;
    cursor: pointer;
    user-select: none;
    transition:
      background 0.2s ease,
      transform 0.16s ease,
      box-shadow 0.2s ease,
      color 0.2s ease;
    color: #e6edf5;
  }

  .sidebar_menu .menu-item:hover,
  .sidebar_menu .menu ul li:hover {
    background: rgba(255, 255, 255, 0.08);
    transform: translateX(2px);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
  }

  .sidebar_menu .menu-item i,
  .sidebar_menu .menu ul li i {
    width: 17px;
    min-width: 17px;
    text-align: center;
    font-size: 14px;
  }

  .sidebar_menu .menu-item span,
  .sidebar_menu .menu ul li span {
    font-size: 12.5px;
    font-weight: 600;
    line-height: 1.2;
    color: inherit;
  }

  /* ==========================
     🎨 ÍCONES PRINCIPAIS
  ========================== */
  .icon-dashboard {
    color: #4caf50 !important;
  }

  .icon-analises {
    color: #ffc107 !important;
  }

  .icon-comparativos {
    color: #9c27b0 !important;
  }

  .icon-config {
    color: #9e9e9e !important;
  }

  /* ==========================
     👑 PAINEL DE OURO
  ========================== */
  .menu-item.menu-painel-ouro {
    position: relative;
    background: linear-gradient(
      90deg,
      rgba(212, 175, 55, 0.1),
      rgba(255, 215, 0, 0.06)
    );
    border: 1px solid rgba(212, 175, 55, 0.22);
  }

  .menu-item.menu-painel-ouro:hover {
    background: linear-gradient(
      90deg,
      rgba(212, 175, 55, 0.18),
      rgba(255, 215, 0, 0.1)
    );
    border-color: rgba(244, 197, 66, 0.34);
    box-shadow:
      0 8px 20px rgba(212, 175, 55, 0.1),
      inset 0 0 0 1px rgba(255, 215, 0, 0.06);
  }

  .icon-painel-ouro {
    color: #d4af37 !important;
    filter: drop-shadow(0 0 4px rgba(212, 175, 55, 0.24));
  }

  .menu-item.menu-painel-ouro span {
    color: #f4e7b2;
    font-weight: 700;
  }

  .menu-item.menu-painel-ouro::after {
    content: "Premium";
    margin-left: auto;
    font-size: 9px;
    font-weight: 700;
    color: #3e2f00;
    background: linear-gradient(180deg, #f4d35e 0%, #d4af37 100%);
    padding: 3px 8px;
    border-radius: 999px;
    box-shadow: 0 4px 10px rgba(212, 175, 55, 0.18);
  }

  /* ==========================
     🔥 CLASSES DINÂMICAS
  ========================== */
  .menu-classe {
    font-weight: 700;
  }

  .submenu {
    display: none;
    margin: 2px 0 8px 0;
    padding: 0;
    list-style: none;
    border-left: 1px solid rgba(255, 255, 255, 0.08);
    margin-left: 14px;
    padding-left: 6px;
  }

  .submenu .submenu-item,
  .submenu li {
    position: relative;
    display: flex;
    align-items: center;
    padding: 6px 10px 6px 30px;
    margin: 2px 0;
    border-radius: 9px;
    font-size: 12px;
    font-weight: 500;
    color: #b9c8d8;
    transition: all 0.2s ease;
    cursor: pointer;
  }

  .submenu .submenu-item::before,
  .submenu li::before {
    content: "";
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #4caf50;
    opacity: 0.9;
  }

  .submenu .submenu-item:hover,
  .submenu li:hover {
    background: rgba(255, 255, 255, 0.06);
    color: #ffffff;
  }

  .submenu.ativo {
    display: block;
  }

  /* ==========================
     🔻 RODAPÉ
  ========================== */
  .bottom-area {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(255, 255, 255, 0.07);
  }

  /* ==========================
     ⚙️ CONFIGURAÇÕES
  ========================== */
  .config-btn {
    margin-bottom: 12px;
    border-radius: 12px;
    cursor: pointer;
    transition:
      background 0.2s ease,
      transform 0.16s ease;
  }

  .config-btn:hover {
    background: rgba(255, 255, 255, 0.07);
    transform: translateX(2px);
  }

  .config-btn-content {
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 42px;
    padding: 10px 12px;
  }

  .config-btn-content span {
    font-size: 13px;
    font-weight: 600;
    color: #dfe7ef;
  }

  /* ==========================
     👤 USUÁRIO (card compacto)
  ========================== */
  .user-footer {
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
  }

  .user-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border-radius: 14px;
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.06),
      rgba(255, 255, 255, 0.035)
    );
    border: 1px solid rgba(255, 255, 255, 0.07);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.03),
      0 8px 18px rgba(0, 0, 0, 0.18);
  }

  .avatar {
    width: 50px;
    height: 50px;
    min-width: 50px;
    border-radius: 14px;
    border: none;
    padding: 0;
    background: linear-gradient(180deg, #1e6091 0%, #0a3d62 100%);
    background-size: cover;
    background-position: center;
    color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 8px 18px rgba(10, 61, 98, 0.3);
    transition: transform 0.15s ease, box-shadow 0.2s ease;
    overflow: hidden;
  }
  .avatar:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 22px rgba(10, 61, 98, 0.4);
  }
  .avatar.tem-foto { color: transparent; }

  .user-main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .user-nome {
    color: #ffffff;
    font-weight: 700;
    font-size: 14px;
    line-height: 1.25;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .user-funcao {
    color: #b8c5d3;
    font-weight: 500;
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ==========================
     🪟 POPOVER DE PERFIL (transparente)
  ========================== */
  .perfil-popover {
    position: absolute;
    bottom: 100%;
    left: 0;
    right: 0;
    margin-bottom: 10px;
    z-index: 50;
    padding: 14px;
    border-radius: 16px;
    background: rgba(18, 29, 51, 0.72);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
    animation: popIn 0.16s ease;
  }
  .perfil-popover[hidden] { display: none; }
  @keyframes popIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .perfil-pop-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .avatar-pop {
    width: 56px; height: 56px; min-width: 56px;
    cursor: default;
    font-size: 19px;
  }
  .avatar-pop:hover { transform: none; }
  .perfil-pop-acoes { display: flex; flex-direction: column; gap: 6px; }
  .pop-btn {
    border: 1px solid rgba(255, 255, 255, 0.16);
    background: rgba(255, 255, 255, 0.08);
    color: #eaf1f8;
    border-radius: 9px;
    padding: 7px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .pop-btn:hover { background: rgba(255, 255, 255, 0.16); }
  .pop-btn-ghost { background: transparent; color: #fb7185; border-color: rgba(251,113,133,0.3); }
  .perfil-pop-dados { display: flex; flex-direction: column; gap: 7px; }
  .pop-linha {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    font-size: 12.5px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    padding-bottom: 6px;
  }
  .pop-linha:last-child { border-bottom: none; padding-bottom: 0; }
  .pop-linha span { color: #9fb0c2; font-weight: 600; }
  .pop-linha b { color: #ffffff; font-weight: 700; text-align: right; word-break: break-word; }

  /* ==========================
     ⚙️🚪 AÇÕES (engrenagem + sair)
  ========================== */
  .footer-acoes {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .btn-config-icon {
    width: 44px;
    height: 44px;
    min-width: 44px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.05);
    color: #cdd8e4;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, color 0.15s ease, transform 0.15s ease;
  }
  .btn-config-icon:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #ffffff;
    transform: translateY(-1px);
  }

  /* ==========================
     🚪 LOGOUT (menor)
  ========================== */
  .btn-logout {
    flex: 1;
    min-height: 44px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #b91c1c, #dc2626);
    color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition:
      transform 0.16s ease,
      box-shadow 0.2s ease,
      filter 0.2s ease;
    box-shadow: 0 8px 16px rgba(220, 38, 38, 0.18);
  }

  .btn-logout:hover {
    transform: translateY(-1px);
    filter: brightness(1.03);
    box-shadow: 0 14px 22px rgba(220, 38, 38, 0.22);
  }

  .btn-logout i {
    font-size: 14px;
  }

  /* ==========================
     📱 RESPONSIVIDADE
  ========================== */
  @media (max-width: 1366px) {
    .sidebar_menu {
      padding: 12px 10px;
    }

    .sidebar_menu .menu-item,
    .sidebar_menu .menu ul li {
      min-height: 42px;
      padding: 9px 11px;
    }

    .sidebar_menu .menu-item span,
    .sidebar_menu .menu ul li span {
      font-size: 13px;
    }

    .menu-item.menu-painel-ouro::after {
      font-size: 9px;
      padding: 3px 7px;
    }

    .user-info {
      padding: 12px;
      gap: 12px;
    }

    .avatar {
      width: 54px;
      height: 54px;
      min-width: 54px;
      font-size: 16px;
    }
  }

  @media (max-width: 1024px) {
    .sidebar_menu .logo a span {
      font-size: 16px;
    }

    .dado-label {
      min-width: 58px;
    }

    .dado-linha {
      font-size: 11px;
    }
  }

  @media (max-width: 768px) {
    .sidebar_menu {
      padding: 10px 8px;
    }

    .sidebar_menu .menu-item,
    .sidebar_menu .menu ul li {
      padding: 9px 10px;
      gap: 10px;
      border-radius: 10px;
    }

    .sidebar_menu .menu-item i,
    .sidebar_menu .menu ul li i {
      width: 16px;
      min-width: 16px;
      font-size: 14px;
    }

    .sidebar_menu .menu-item span,
    .sidebar_menu .menu ul li span {
      font-size: 12px;
    }

    .menu-item.menu-painel-ouro::after {
      display: none;
    }

    .user-info {
      padding: 11px;
      gap: 10px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      min-width: 48px;
      border-radius: 14px;
      font-size: 15px;
    }

    .dado-label {
      min-width: 54px;
    }

    .dado-linha {
      gap: 4px;
      font-size: 10.5px;
    }

    .btn-logout span {
      font-size: 12px;
    }
  }

  @media (min-width: 1600px) {
    .sidebar_menu {
      padding: 16px 14px;
    }

    .sidebar_menu .logo a {
      font-size: 19px;
    }

    .sidebar_menu .menu-item,
    .sidebar_menu .menu ul li {
      min-height: 46px;
    }

    .sidebar_menu .menu-item span,
    .sidebar_menu .menu ul li span {
      font-size: 14px;
    }

    .user-info {
      padding: 15px;
    }

    .avatar {
      width: 60px;
      height: 60px;
      min-width: 60px;
    }

    .dado-linha {
      font-size: 12.5px;
    }
  }

  @media (min-width: 2200px) {
    .sidebar_menu {
      padding: 18px 16px;
    }

    .sidebar_menu .logo a {
      font-size: 20px;
    }

    .sidebar_menu .menu-item span,
    .sidebar_menu .menu ul li span {
      font-size: 15px;
    }
  }
</style>

<div class="main_box">
  <input type="checkbox" id="check" />

  <div class="sidebar_menu">
    <!-- ==========================
         🔷 LOGO
    =========================== -->
    <div class="logo">
      <a
        href="#"
        onclick="
          logMenu('logo');
          mostrar('analises');
          return false;
        "
      >
        <i class="fas fa-layer-group" style="color: #3f7bcc"></i>
        <span>OnePage Expert</span>
      </a>
    </div>

    <!-- ==========================
         📋 MENU PRINCIPAL
    =========================== -->
    <div class="menu">
      <ul id="menu-list">
        <!-- ANÁLISES -->
        <li
          class="menu-item"
          data-menu="analises"
          onclick="
            logMenu('analises');
            mostrar('analises');
          "
        >
          <i class="fas fa-trophy icon-analises"></i>
          <span>Análises</span>
        </li>

        <!-- PAINEL DE OURO -->
        <li
          class="menu-item menu-painel-ouro"
          data-menu="painel-ouro"
          onclick="
            logMenu('painel-ouro');
            mostrar('painel-ouro');
          "
        >
          <i class="fas fa-crown icon-painel-ouro"></i>
          <span>Painel de Ouro</span>
        </li>

        <!-- COMPARATIVOS -->
        <li
          class="menu-item"
          data-menu="comparativos"
          onclick="
            logMenu('comparativos');
            mostrar('comparativos');
          "
        >
          <i class="fas fa-chart-pie icon-comparativos"></i>
          <span>Comparativos</span>
        </li>

        <!-- 🔥 CLASSES DINÂMICAS ENTRAM AQUI -->
      </ul>
    </div>

    <!-- ==========================
         🔻 RODAPÉ
    =========================== -->
    <div class="bottom-area">
      <!-- ==========================
           👤 USUÁRIO
      =========================== -->
      <div class="user-footer">
        <!-- card compacto: avatar + nome/sobrenome + função -->
        <div class="user-card">
          <button
            type="button"
            class="avatar"
            id="avatar"
            onclick="abrirPerfilPopover(event)"
            title="Ver dados e trocar foto"
          ></button>
          <div class="user-main">
            <div class="user-nome" id="nomeUsuario"></div>
            <div class="user-funcao" id="funcaoUsuario"></div>
          </div>
        </div>

        <!-- popover transparente com todos os dados -->
        <div class="perfil-popover" id="perfilPopover" hidden>
          <div class="perfil-pop-top">
            <div class="avatar avatar-pop" id="avatarPop"></div>
            <div class="perfil-pop-acoes">
              <button
                type="button"
                class="pop-btn"
                onclick="document.getElementById('inputFotoPerfil').click()"
              >
                <i class="fas fa-camera"></i> Trocar foto
              </button>
              <button
                type="button"
                class="pop-btn pop-btn-ghost"
                id="btnRemoverFoto"
                onclick="removerFotoPerfil()"
                hidden
              >
                Remover
              </button>
              <input
                type="file"
                id="inputFotoPerfil"
                accept="image/*"
                hidden
                onchange="trocarFotoPerfil(event)"
              >
            </div>
          </div>
          <div class="perfil-pop-dados">
            <div class="pop-linha"><span>Nome</span><b id="popNome"></b></div>
            <div class="pop-linha"><span>Sobrenome</span><b id="popSobrenome"></b></div>
            <div class="pop-linha"><span>Matrícula</span><b id="popMatricula"></b></div>
            <div class="pop-linha"><span>Função</span><b id="popFuncao"></b></div>
            <div class="pop-linha"><span>E-mail</span><b id="popEmail"></b></div>
          </div>
        </div>

        <!-- ações: engrenagem + sair (compactos) -->
        <div class="footer-acoes">
          <button
            type="button"
            class="btn-config-icon"
            title="Configurações"
            onclick="logMenu('configuracoes'); abrirConfiguracoesMenu();"
          >
            <i class="fas fa-gear"></i>
          </button>
          <button
            type="button"
            class="btn-logout"
            onclick="logMenu('logout'); logout();"
          >
            <i class="fas fa-right-from-bracket"></i>
            <span>Sair</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
